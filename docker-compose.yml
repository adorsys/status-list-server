services:
  db:
    image: postgres:18.4
    restart: always
    container_name: status-list-db
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-status-list}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - status-list-network

  redis:
    image: redis:8.6
    container_name: redis
    ports:
      - 6379:6379
    networks:
      - status-list-network

  localstack:
    container_name: localstack
    image: localstack/localstack:4.14
    ports:
      - 4566:4566
    environment:
      - SERVICES=s3,secretsmanager
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - status-list-network

  challtestsrv:
    image: ghcr.io/letsencrypt/pebble-challtestsrv:2.10
    command: -http01 "" -https01 "" -tlsalpn01 ""
    ports:
      - 8055:8055
    networks:
      - status-list-network

  pebble:
    image: ghcr.io/letsencrypt/pebble:2.10
    command: -config /test/pebble_config.json -strict -dnsserver challtestsrv:8053
    ports:
      - 14000:14000
      - 15000:15000
    depends_on:
      challtestsrv:
        condition: service_started
    networks:
      - status-list-network
    volumes:
      - ./test_data/pebble_config.json:/test/pebble_config.json

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: status-list-server
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_SERVER__ENABLE_METRICS: ${APP_SERVER__ENABLE_METRICS:-true}
      APP_AWS__S3_BUCKET: ${APP_AWS__S3_BUCKET:-status-list-adorsys}
      APP_STATUS_LIST__TOKEN_EXP_SECS: ${APP_STATUS_LIST__TOKEN_EXP_SECS:-900}
      APP_STATUS_LIST__TOKEN_TTL_SECS: ${APP_STATUS_LIST__TOKEN_TTL_SECS:-300}
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      pebble:
        condition: service_started
      localstack:
        condition: service_healthy
      pushgateway:
        condition: service_started
    networks:
      - status-list-network

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    ports:
      - 9090:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - status-list-network
    # Only scrape metrics if endpoint is exposed
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  pushgateway:
    image: prom/pushgateway:v1.11.2
    container_name: pushgateway
    ports:
      - 9091:9091
    networks:
      - status-list-network

networks:
  status-list-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
