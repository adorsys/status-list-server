# Configuration for cargo-deny
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
# Unmaintained advisories only cause an error when the affected crate is a
# direct dependency of a workspace crate. Transitive unmaintained crates
# (e.g. proc-macro-error2 pulled via sea-orm/sea-bae) are reported but do not
# fail the build. Vulnerabilities (RUSTSEC advisories with a CVE) always fail.
version = 2
unmaintained = "workspace"
# Some ignored IDs below are only visible when cargo-audit scans the full
# lockfile and are not part of cargo-deny's resolved graph; suppress the
# "advisory was not encountered" notice for those.
unused-ignored-advisory = "allow"
# Pre-existing transitive vulnerabilities that cannot be fixed within this
# repository. These are tracked separately and match the `[advisories].ignore`
# list in `.cargo/audit.toml`:
#
# - rsa 0.9.10 (RUSTSEC-2023-0071, Marvin Attack): no fixed version is
#   available upstream. Pulled in only through sqlx-mysql, whose `mysql`
#   feature is never enabled (we use sqlx-postgres); the crate is therefore
#   part of Cargo.lock but not compiled. Revisit when rsa ships a fix.
# - rustls-webpki 0.101.7 (RUSTSEC-2026-0098/0099/0104): pulled transitively
#   through the old rustls 0.21 used by aws-smithy-http-client. Requires an
#   AWS SDK bump to drop rustls 0.21; tracked separately.
ignore = [
    "RUSTSEC-2023-0071",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
]

[licenses]
# Allow common permissive licenses; reject unknown / no-license crates.
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
]
confidence-threshold = 0.8

[bans]
# Disallow multiple versions of the same crate unless explicitly allowed.
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only allow crates from crates.io by default.
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
