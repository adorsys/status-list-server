name: "CodeQL"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/codeql.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@cdcdbb5ceac1ca5d66cbb3a502b9ffa1a5505ded # v3
        with:
          languages: rust
          queries: security-extended
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@cdcdbb5ceac1ca5d66cbb3a502b9ffa1a5505ded # v3
        with:
          category: "/language:rust"
