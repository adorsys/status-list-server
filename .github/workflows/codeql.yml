name: "CodeQL"

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@b93a5597a6d24ac3e57f5c4ee97b0e7a0c91db62 # v1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake golang-go

      - name: Initialize CodeQL
        uses: github/codeql-action/init@cdcdbb5ceac1ca5d66cbb3a502b9ffa1a5505ded # v3
        with:
          languages: rust
          queries: security-extended,security-and-quality

      - name: Build
        run: cargo build --workspace --all-targets --all-features

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@cdcdbb5ceac1ca5d66cbb3a502b9ffa1a5505ded # v3
        with:
          category: "/language:rust"
