name: Cargo deny
on:
  workflow_call:
  workflow_dispatch:
jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "stable"
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit
  cargo-vet:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-vet
        # taiki-e/install-action ships the latest GitHub binary release,
        # which for cargo-vet is still v0.10.0 (2024-10-03). That version
        # predates "Trusted Publishing" support (added in v0.10.2, see
        # CHANGELOG), so it rejects [[publisher.<crate>]] entries in
        # imports.lock that use `trusted-publisher` instead of `user-id`
        # with "missing field `user-id`". Building 0.10.2 from source via
        # crates.io avoids that parser incompatibility.
        run: cargo install cargo-vet --version 0.10.2 --locked
      - name: Run cargo vet
        # Verifies that every crate in Cargo.lock has either an audit record
        # (supply-chain/audits.toml) or a vetted exemption
        # (supply-chain/config.toml). New or bumped dependencies that have
        # not been signed off will fail here, gating supply-chain changes.
        run: cargo vet
