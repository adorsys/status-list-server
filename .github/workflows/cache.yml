# Workflow to clean the cache in case of issues
name: Clean Cache

permissions:
  actions: write

on:
  workflow_dispatch:

jobs:
  clean-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - run: gh cache delete --all
        env:
          GH_TOKEN: ${{ github.token }}
