name: Build and Deploy to EKS
on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
env:
  IMAGE_NAME: status-list-server
  NAMESPACE: statuslist
  CLUSTER_NAME: datev-wallet-cluster
  AWS_REGION: eu-central-1
  REGISTRY: ghcr.io
  # ARN of the IAM role provisioned by wallet-eks-env's github-actions-oidc
  # Terraform module. Not a secret (the trust policy is what protects it),
  # but kept as a repository variable so it can be rotated without a code
  # change if the role is ever recreated.
  AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
jobs:
  build-and-push:
    name: Build and Push Docker Image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.SHORT_SHA }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get short commit SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
  verify-ci:
    name: Verify CI is green on main
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/CI.yml
    secrets: inherit

  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build-and-push, verify-ci]
    if: github.ref == 'refs/heads/main' && needs.build-and-push.result == 'success' && needs.verify-ci.result == 'success'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v5
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: status-list-server-deploy
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
      - name: Deploy updated image to Kubernetes
        run: |
          kubectl set image deployment/statuslist-status-list-server-deployment \
            status-list-server=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ needs.build-and-push.outputs.image_tag }} \
            -n ${{ env.NAMESPACE }}
