name: "CI"
on:
  merge_group:
  workflow_dispatch:
  workflow_call:
  pull_request:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  cargo-fmt:
    name: Cargo Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Rustfmt Check
        run: cargo fmt --all --check
  cargo-build:
    name: Cargo Build
    runs-on: ubuntu-latest
    needs: cargo-fmt
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake
      - name: Cargo Build
        run: cargo build --workspace --all-targets --all-features
  cargo-build-release:
    name: Cargo Build (release)
    runs-on: ubuntu-latest
    needs: cargo-fmt
    # Only x86_64-unknown-linux-gnu is built natively here. The production
    # deploy targets (x86_64 / aarch64 *-unknown-linux-musl) are compiled
    # inside the Docker image by the docker-build job below, which is the
    # source of truth for the actual deploy triples. Cross-compiling
    # aws-lc-sys for aarch64 on a stock ubuntu runner needs a full cross
    # C/CMake toolchain that is not worth the complexity of this matrix.
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          key: release-x86_64-unknown-linux-gnu
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake
      - name: Cargo Build (release)
        run: cargo build --workspace --all-targets --all-features --release
  cargo-clippy:
    name: Cargo Clippy Check
    runs-on: ubuntu-latest
    needs: cargo-build
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake
      - name: Clippy Check
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
  cargo-nextest:
    name: Cargo Nextest
    runs-on: ubuntu-latest
    needs: cargo-build
    # No service containers: integration tests spin up their own Redis /
    # Pebble / LocalStack via the testcontainers crate against the runner's
    # Docker daemon, and unit tests use the SeaORM mock database / sealed
    # env, so live Postgres / Redis connections are never opened here.
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: Run Cargo Tests
        run: cargo nextest run --workspace --all-targets --all-features
        env:
          # Integration tests use testcontainers which spins up its own
          # containers on the runner's Docker daemon (available on ubuntu-latest).
          TESTCONTAINERS_RYUK_DISABLED: "true"
  cargo-doc:
    name: Cargo Documentation
    runs-on: ubuntu-latest
    needs: cargo-build
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake
      - name: Generate Documentation
        run: cargo doc --workspace --all-features --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings
  check-crate-type:
    uses: ./.github/workflows/crate_type.yml
  cargo-test-doc:
    needs: check-crate-type
    if: ${{ needs.check-crate-type.outputs.is_lib == 'true' }}
    name: Cargo test doc
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake
      - name: Cargo test doc
        run: cargo test --doc --workspace --all-features
  cargo-machete:
    name: Cargo Machete Check
    runs-on: ubuntu-latest
    needs: cargo-build
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - name: Check for unused dependencies
        run: cargo machete --with-metadata
  cargo-deny:
    uses: ./.github/workflows/cargo_deny.yml
  cargo-coverage:
    name: Cargo Coverage (llvm-cov)
    runs-on: ubuntu-latest
    needs: cargo-build
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake
      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,nextest
      - name: Generate code coverage
        run: |
          mkdir -p coverage
          cargo llvm-cov nextest \
            --workspace \
            --all-features \
            --lcov \
            --output-path coverage/coverage.lcov
        env:
          # Integration tests use testcontainers which spins up its own
          # containers on the runner's Docker daemon (available on ubuntu-latest).
          TESTCONTAINERS_RYUK_DISABLED: "true"
      - name: Upload coverage to Codecov
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/
          if-no-files-found: warn
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: cargo-build
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: status-list-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Inspect built image
        run: docker image inspect status-list-server:ci --format '{{.Id}}'
  typos-cli:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install Typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos-cli
      - name: run typos
        run: typos
  tombi-toml-lint:
    name: Tombi TOML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Install Taplo
        uses: tombi-toml/setup-tombi@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate TOML files
        run: tombi lint
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            #target
            #.git
            #node_modules
  yaml-lint:
    name: YAML Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: YAML Lint
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - name: Install yamlfmt
        run: go install github.com/google/yamlfmt/cmd/yamlfmt@latest
      - name: Run yamlfmt
        # Helm templates under helm/ use Go template delimiters ({{ }}) that
        # are not valid YAML for a formatter, so linting is scoped to the
        # GitHub Actions workflow files.
        run: yamlfmt -lint .github/workflows/*.yml
