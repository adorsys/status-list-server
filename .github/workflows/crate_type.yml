name: Crate Type
on:
  workflow_call:
    outputs:
      is_lib:
        value: ${{ jobs.check-crate-type.outputs.is_lib }}
      is_bin:
        value: ${{ jobs.check-crate-type.outputs.is_bin }}
jobs:
  check-crate-type:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6
      - name: Detect crate kinds
        id: searching
        # cargo and jq are preinstalled on ubuntu-latest; this flattens the
        # target kinds across ALL workspace packages (not just the first).
        run: |
          result=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '[.packages[].targets[].kind[]] | unique | join(" ")')
          echo "targets=$result" >> "$GITHUB_OUTPUT"
          echo "kind of targets: $result"
    outputs:
      is_lib: ${{ contains(steps.searching.outputs.targets, 'lib') }}
      is_bin: ${{ contains(steps.searching.outputs.targets, 'bin') }}
